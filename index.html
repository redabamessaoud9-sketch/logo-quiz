<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Quiz Master - Édition Bleue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            /* Remplacement du rose par le bleu/cyan électrique */
            --primary: #00f5d4;       
            --primary-glow: rgba(0, 245, 212, 0.4);
            --secondary: #0077ff;     /* Bleu profond pour les contrastes */
            --secondary-glow: rgba(0, 119, 255, 0.4);
            --accent: #ffb703;        
            --bg-dark: #05050d;       
            --panel-bg: rgba(13, 12, 28, 0.75); 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #00f5d4;       
            --error: #ff3366;         /* Rouge vif pour les erreurs */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 245, 212, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 119, 255, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 245, 212, 0.05);
            width: 90%;
            max-width: 600px;
            padding: 40px;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.8rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--text-main) 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 245, 212, 0.3);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        p.subtitle { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 30px; }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, #00b4d8 100%);
            color: #000; /* Texte noir pour plus de contraste sur le cyan */
            border: none;
            padding: 14px 28px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px var(--primary-glow);
            width: 100%;
            margin-bottom: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
            filter: brightness(1.2);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            box-shadow: none;
            margin-bottom: 0;
            width: auto;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Grille des Stages */
        .stages-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .stages-grid::-webkit-scrollbar { width: 6px; }
        .stages-grid::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .stages-grid::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .stage-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .stage-card .stage-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stage-card.unlocked {
            border-color: rgba(0, 245, 212, 0.2);
            background: rgba(0, 245, 212, 0.05);
        }
        .stage-card.unlocked:hover {
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 5px 15px var(--primary-glow);
        }
        .stage-card.completed {
            border-color: var(--primary);
            background: rgba(0, 245, 212, 0.1);
        }
        .stage-card.completed .stage-num { color: var(--primary); }
        .stage-card.locked { opacity: 0.4; cursor: not-allowed; }

        /* Zone d'affichage du Logo */
        .logo-frame {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 220px;
            height: 220px;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 10px 25px rgba(0,0,0,0.2);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .logo-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .input-group { margin-bottom: 25px; width: 100%; }
        .input-bar {
            width: 100%;
            background: rgba(13, 12, 28, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 16px 24px;
            font-size: 1.2rem;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .attempts-container {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 20px;
        }
        .heart-icon {
            font-size: 1.6rem; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow);
            transition: all 0.3s ease;
        }
        .heart-icon.lost { color: rgba(255, 255, 255, 0.1); text-shadow: none; transform: scale(0.8); }

        #feedback { font-size: 1.1rem; font-weight: 700; min-height: 28px; margin-bottom: 15px; text-transform: uppercase; }

        .music-control {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s ease; z-index: 10;
        }
        .music-control:hover {
            background: var(--primary); border-color: var(--primary); color: #000;
            box-shadow: 0 0 15px var(--primary-glow); transform: rotate(15deg);
        }

        .hidden { display: none !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease; border-color: var(--error); box-shadow: 0 0 25px rgba(255, 51, 102, 0.4); }
        .success-glow { border-color: var(--success); box-shadow: 0 0 30px var(--primary-glow); }
    </style>
</head>
<body>

    <!-- Lecteur audio pointant vers ton fichier -->
    <audio id="bg-music" loop preload="auto">
        <source src="musique.mp3" type="audio/mpeg">
    </audio>

    <button id="music-btn" class="music-control" onclick="toggleMusic()">
        <i class="fa-solid fa-volume-xmark"></i>
    </button>

    <div class="container">
        
        <!-- ÉCRAN : MENU PRINCIPAL -->
        <div id="menu-screen">
            <h1>Logo Quiz</h1>
            <p class="subtitle">Identifiez la marque mystère</p>
            <button class="btn" onclick="showCategories()">
                <i class="fa-solid fa-play"></i> Jouer
            </button>
        </div>

        <!-- ÉCRAN : CATÉGORIES -->
        <div id="category-screen" class="hidden">
            <h2>Catégories</h2>
            <button class="btn" onclick="selectCategory('restaurants')"><i class="fa-solid fa-burger"></i> Restaurants</button>
            <button class="btn" onclick="selectCategory('voitures')"><i class="fa-solid fa-car"></i> Voitures</button>
            <button class="btn" onclick="selectCategory('vetements')"><i class="fa-solid fa-shirt"></i> Vêtements</button>
            <button class="btn btn-secondary" onclick="showMenu()" style="margin-top: 15px;"><i class="fa-solid fa-arrow-left"></i> Retour</button>
        </div>

        <!-- ÉCRAN : SÉLECTION DE STAGE -->
        <div id="stage-screen" class="hidden">
            <h2 id="stage-title-cat">Niveaux</h2>
            <div class="stages-grid" id="stages-grid"></div>
            <button class="btn btn-secondary" onclick="showCategories()"><i class="fa-solid fa-arrow-left"></i> Catégories</button>
        </div>

        <!-- ÉCRAN : JEU -->
        <div id="game-screen" class="hidden">
            <h2 id="game-stage-title">Niveau X</h2>
            
            <div class="attempts-container" id="attempts-container"></div>

            <div class="logo-frame" id="logo-frame">
                <!-- Fallback sur une image vide d'erreur si le lien casse -->
                <img id="logo-image" src="" alt="Logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg'">
            </div>

            <div id="feedback"></div>

            <div class="input-group">
                <input type="text" class="input-bar" id="answer-input" placeholder="RÉPONSE..." autocomplete="off">
            </div>

            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn btn-secondary" onclick="showStagesList()"><i class="fa-solid fa-grip"></i></button>
                <button class="btn" style="margin-bottom:0;" id="validate-btn" onclick="checkAnswer()"><i class="fa-solid fa-check"></i> Valider</button>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DONNÉES DES 60 LOGOS ---

                { stage: 12, logo: "https://upload.wikimedia.org/wikipedia/commons/a/ae/Dairy_Queen_logo.svg", answer: "dairy queen" },
                { stage: 13, logo: "https://upload.wikimedia.org/wikipedia/en/4/42/Papa_John%27s_Pizza_logo.svg", answer: "papa johns" },
                { stage: 14, logo: "https://upload.wikimedia.org/wikipedia/en/c/c5/Nandos_logo.svg", answer: "nandos" },
                { stage: 15, logo: "https://upload.wikimedia.org/wikipedia/commons/8/80/Five_Guys_logo.svg", answer: "five guys" },
                { stage: 16, logo: "https://upload.wikimedia.org/wikipedia/en/0/07/Shake_Shack_logo.svg", answer: "shake shack" },
                { stage: 17, logo: "https://upload.wikimedia.org/wikipedia/commons/0/03/In-N-Out_Burger_logo.svg", answer: "in n out" },
                { stage: 18, logo: "https://upload.wikimedia.org/wikipedia/en/c/ca/Panda_Express_logo.svg", answer: "panda express" },
                { stage: 19, logo: "https://upload.wikimedia.org/wikipedia/commons/5/57/Tim_Hortons_logo.svg", answer: "tim hortons" },
                { stage: 20, logo: "https://upload.wikimedia.org/wikipedia/commons/f/f6/Hard_Rock_Cafe_Logo.svg", answer: "hard rock cafe" }
            ],
            voitures: [
                { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg", answer: "bmw" },
                { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/commons/9/90/Mercedes-Logo.svg", answer: "mercedes" },
                { stage: 3, logo: "https://upload.wikimedia.org/wikipedia/commons/9/9f/Toyota_logo_%28Red%29.svg", answer: "toyota" },
                { stage: 4, logo: "https://logos-world.net/porsche-logo/", answer: "porsche" },
                { stage: 5, logo: "https://upload.wikimedia.org/wikipedia/commons/a/a9/Volkswagen_Logo_2019.svg", answer: "volkswagen" },
                { stage: 6, logo: "https://upload.wikimedia.org/wikipedia/en/d/df/Lamborghini_Logo.svg", answer: "lamborghini" },
                { stage: 7, logo: "https://upload.wikimedia.org/wikipedia/en/d/d1/Ferrari-Logo.svg", answer: "ferrari" },
                { stage: 8, logo: "https://upload.wikimedia.org/wikipedia/commons/7/7b/Honda_Logo.svg", answer: "honda" },
                { stage: 9, logo: "https://upload.wikimedia.org/wikipedia/commons/a/a0/Ford_Motor_Company_Logo.svg", answer: "ford" },
                { stage: 10, logo: "https://upload.wikimedia.org/wikipedia/commons/e/e8/Tesla_logo.png", answer: "tesla" },
                { stage: 11, logo: "https://upload.wikimedia.org/wikipedia/commons/9/92/Audi-Logo_2016.svg", answer: "audi" },
                { stage: 12, logo: "https://upload.wikimedia.org/wikipedia/commons/8/8c/Nissan_logo.png", answer: "nissan" },
                { stage: 13, logo: "https://upload.wikimedia.org/wikipedia/commons/f/f4/Peugeot_2021_Logo.svg", answer: "peugeot" },
                { stage: 14, logo: "https://upload.wikimedia.org/wikipedia/commons/1/11/Suzuki_logo_2.svg", answer: "suzuki" },
                { stage: 15, logo: "https://upload.wikimedia.org/wikipedia/commons/b/b3/Kia_Motors_Logo_2021.svg", answer: "kia" },
                { stage: 16, logo: "https://upload.wikimedia.org/wikipedia/commons/c/c5/Chevrolet_logo.svg", answer: "chevrolet" },
                { stage: 17, logo: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Mazda_logo.svg", answer: "mazda" },
                { stage: 18, logo: "https://upload.wikimedia.org/wikipedia/commons/8/8c/Renault_logo_2021.svg", answer: "renault" },
                { stage: 19, logo: "https://upload.wikimedia.org/wikipedia/commons/1/18/Fiat_logo.svg", answer: "fiat" },
                { stage: 20, logo: "https://upload.wikimedia.org/wikipedia/commons/8/8c/Maserati_logo.svg", answer: "maserati" }
            ],
            vetements: [
                { stage: 1, logo: "https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg", answer: "nike" },
                { stage: 2, logo: "https://upload.wikimedia.org/wikipedia/commons/2/20/Adidas_Logo.svg", answer: "adidas" },
                { stage: 3, logo: "https://upload.wikimedia.org/wikipedia/commons/e/ec/Puma_logo.svg", answer: "puma" },
                { stage: 4, logo: "https://upload.wikimedia.org/wikipedia/commons/c/c3/Gucci_logo.svg", answer: "gucci" },
                { stage: 5, logo: "https://upload.wikimedia.org/wikipedia/commons/f/fd/Zara_Logo.svg", answer: "zara" },
                { stage: 6, logo: "https://upload.wikimedia.org/wikipedia/commons/5/53/H%26M-Logo.svg", answer: "hm" },
                { stage: 7, logo: "https://upload.wikimedia.org/wikipedia/commons/1/19/Levi%27s_logo.svg", answer: "levis" },
                { stage: 8, logo: "https://upload.wikimedia.org/wikipedia/commons/3/30/The_North_Face_logo.svg", answer: "the north face" },
                { stage: 9, logo: "https://upload.wikimedia.org/wikipedia/commons/9/90/Under_armour_logo.svg", answer: "under armour" },
                { stage: 10, logo: "https://upload.wikimedia.org/wikipedia/commons/7/7b/Lacoste_logo.svg", answer: "lacoste" },
                { stage: 11, logo: "https://upload.wikimedia.org/wikipedia/commons/c/cb/Vans_logo.svg", answer: "vans" },
                { stage: 12, logo: "https://upload.wikimedia.org/wikipedia/commons/3/37/Calvin_Klein_logo.svg", answer: "calvin klein" },
                { stage: 13, logo: "https://upload.wikimedia.org/wikipedia/commons/3/3d/Converse_logo.svg", answer: "converse" },
                { stage: 14, logo: "https://upload.wikimedia.org/wikipedia/commons/2/28/Supreme_Logo.svg", answer: "supreme" },
                { stage: 15, logo: "https://upload.wikimedia.org/wikipedia/commons/b/b8/Prada-Logo.svg", answer: "prada" },
                { stage: 16, logo: "https://upload.wikimedia.org/wikipedia/commons/6/69/Balenciaga_logo.svg", answer: "balenciaga" },
                { stage: 17, logo: "https://upload.wikimedia.org/wikipedia/commons/f/f6/Versace_logo.svg", answer: "versace" },
                { stage: 18, logo: "https://upload.wikimedia.org/wikipedia/commons/0/09/Chanel_logo.svg", answer: "chanel" },
                { stage: 19, logo: "https://upload.wikimedia.org/wikipedia/commons/b/b2/Fila_logo.svg", answer: "fila" },
                { stage: 20, logo: "https://upload.wikimedia.org/wikipedia/commons/c/c5/Reebok_logo.svg", answer: "reebok" }
            ]
        };

        // Variables globales
        let activeCategory = '';
        let currentStageIndex = 0;
        let musicPlaying = false;
        let attemptsLeft = 3;
        let cooldownInterval = null;

        // Éléments DOM
        const menuScreen = document.getElementById('menu-screen');
        const categoryScreen = document.getElementById('category-screen');
        const stageScreen = document.getElementById('stage-screen');
        const gameScreen = document.getElementById('game-screen');
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');

        // Navigation
        function showMenu() {
            hideAll(); menuScreen.classList.remove('hidden');
        }

        function showCategories() {
            hideAll(); categoryScreen.classList.remove('hidden');
        }

        function hideAll() {
            menuScreen.classList.add('hidden');
            categoryScreen.classList.add('hidden');
            stageScreen.classList.add('hidden');
            gameScreen.classList.add('hidden');
        }

        // Sélection de catégorie
        function selectCategory(cat) {
            activeCategory = cat;
            document.getElementById('stage-title-cat').innerText = cat.toUpperCase();
            showStagesList();
        }

        function getUnlockedStage(cat) {
            return parseInt(localStorage.getItem(`maxStage_${cat}`)) || 1;
        }

        function showStagesList() {
            hideAll(); stageScreen.classList.remove('hidden');
            const grid = document.getElementById('stages-grid');
            grid.innerHTML = '';
            
            const maxUnlocked = getUnlockedStage(activeCategory);
            const data = gameCategories[activeCategory];

            data.forEach((level, index) => {
                const card = document.createElement('div');
                card.className = 'stage-card';
                
                const isCompleted = localStorage.getItem(`stage_${activeCategory}_${level.stage}_done`) === "true";
                const isUnlocked = level.stage <= maxUnlocked;

                if (isCompleted) {
                    card.classList.add('completed');
                    card.innerHTML = `<div class="stage-num">${level.stage}</div><i class="fa-solid fa-check"></i>`;
                } else if (isUnlocked) {
                    card.classList.add('unlocked');
                    card.innerHTML = `<div class="stage-num">${level.stage}</div>`;
                } else {
                    card.classList.add('locked');
                    card.innerHTML = `<div class="stage-num"><i class="fa-solid fa-lock"></i></div>`;
                }

                if (isUnlocked) card.onclick = () => launchGame(index);
                grid.appendChild(card);
            });
        }

        // Lancement Jeu
        function launchGame(index) {
            currentStageIndex = index;
            hideAll(); gameScreen.classList.remove('hidden');
            
            if (!musicPlaying) toggleMusic();

            const level = gameCategories[activeCategory][index];
            document.getElementById('game-stage-title').innerText = `Niveau ${level.stage}`;
            document.getElementById('logo-image').src = level.logo;
            document.getElementById('answer-input').value = '';
            document.getElementById('logo-frame').classList.remove('success-glow', 'shake');
            
            if (!checkCooldown()) {
                attemptsLeft = 3;
                updateAttemptsUI();
                enableInputs();
                document.getElementById('feedback').innerText = '';
                document.getElementById('answer-input').focus();
            }
        }

        function updateAttemptsUI() {
            const container = document.getElementById('attempts-container');
            container.innerHTML = '';
            for (let i = 1; i <= 3; i++) {
                const heart = document.createElement('i');
                heart.className = i <= attemptsLeft ? 'fa-solid fa-heart heart-icon' : 'fa-solid fa-heart heart-icon lost';
                container.appendChild(heart);
            }
        }

        function disableInputs() {
            document.getElementById('answer-input').disabled = true;
            document.getElementById('validate-btn').disabled = true;
        }

        function enableInputs() {
            document.getElementById('answer-input').disabled = false;
            document.getElementById('validate-btn').disabled = false;
        }

        // Système de Cooldown propre à la catégorie
        function checkCooldown() {
            const cooldownEnd = localStorage.getItem(`cooldown_${activeCategory}`);
            if (cooldownEnd) {
                const timeLeft = parseInt(cooldownEnd) - Date.now();
                if (timeLeft > 0) {
                    startCooldownTimer();
                    return true;
                } else {
                    localStorage.removeItem(`cooldown_${activeCategory}`);
                }
            }
            return false;
        }

        function startCooldownTimer() {
            clearInterval(cooldownInterval);
            disableInputs();
            attemptsLeft = 0; updateAttemptsUI();
            const feedback = document.getElementById('feedback');

            function updateTimer() {
                const end = localStorage.getItem(`cooldown_${activeCategory}`);
                if (!end) return endCooldown();
                
                const remaining = parseInt(end) - Date.now();
                if (remaining <= 0) {
                    endCooldown();
                } else {
                    const m = Math.floor(remaining / 60000);
                    const s = Math.floor((remaining % 60000) / 1000);
                    feedback.style.color = 'var(--accent)';
                    feedback.innerHTML = `Bloqué ! Reviens dans ${m}:${s < 10 ? '0'+s : s}`;
                }
            }
            updateTimer();
            cooldownInterval = setInterval(updateTimer, 1000);
        }

        function endCooldown() {
            clearInterval(cooldownInterval);
            localStorage.removeItem(`cooldown_${activeCategory}`);
            attemptsLeft = 3; updateAttemptsUI(); enableInputs();
            document.getElementById('feedback').innerText = 'Vies rechargées !';
            document.getElementById('feedback').style.color = 'var(--primary)';
        }

        // Validation 
        function normalizeString(str) {
            return str.toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        function checkAnswer() {
            if (localStorage.getItem(`cooldown_${activeCategory}`)) return;

            const currentLevel = gameCategories[activeCategory][currentStageIndex];
            const userAnswerRaw = document.getElementById('answer-input').value;
            const userAnswer = normalizeString(userAnswerRaw);
            const correctAnswer = normalizeString(currentLevel.answer);
            const frame = document.getElementById('logo-frame');
            const feedback = document.getElementById('feedback');

            frame.classList.remove('shake', 'success-glow');

            if (userAnswer === correctAnswer) {
                feedback.style.color = 'var(--success)';
                feedback.innerText = 'Correct !';
                frame.classList.add('success-glow');

                localStorage.setItem(`stage_${activeCategory}_${currentLevel.stage}_done`, "true");
                const currentMax = getUnlockedStage(activeCategory);
                if (currentLevel.stage >= currentMax && currentLevel.stage < 20) {
                    localStorage.setItem(`maxStage_${activeCategory}`, currentLevel.stage + 1);
                }

                setTimeout(() => {
                    if (currentStageIndex + 1 < gameCategories[activeCategory].length) {
                        launchGame(currentStageIndex + 1);
                    } else {
                        alert('Félicitations, vous avez terminé cette catégorie !');
                        showStagesList();
                    }
                }, 1000);

            } else {
                attemptsLeft--;
                updateAttemptsUI();
                frame.classList.add('shake');

                if (attemptsLeft <= 0) {
                    const cooldownTime = Date.now() + 5 * 60 * 1000;
                    localStorage.setItem(`cooldown_${activeCategory}`, cooldownTime);
                    startCooldownTimer();
                } else {
                    feedback.style.color = 'var(--error)';
                    feedback.innerText = `Faux ! ${attemptsLeft} essai(s) restant(s).`;
                }
                setTimeout(() => frame.classList.remove('shake'), 400);
            }
        }

        document.getElementById('answer-input').addEventListener("keypress", function(e) {
            if (e.key === "Enter") { e.preventDefault(); checkAnswer(); }
        });

        function toggleMusic() {
            if (musicPlaying) {
                bgMusic.pause();
                musicBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                musicBtn.style.background = 'rgba(255, 255, 255, 0.05)';
            } else {
                bgMusic.volume = 0.3;
                bgMusic.play().catch(e => console.log("Clic requis pour l'audio"));
                musicBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                musicBtn.style.background = 'var(--primary)';
                musicBtn.style.color = '#000';
            }
            musicPlaying = !musicPlaying;
        }
    </script>
</body>
</html>

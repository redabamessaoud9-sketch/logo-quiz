<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Quiz Cyberpunk Edition</title>
    <!-- Tailwind CSS pour un design responsive ultra rapide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts pour la typographie futuriste -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome pour les icônes de contrôle et de jeu -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tone.js pour la musique et les effets sonores synthétisés en temps réel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #030008;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 0, 127, 0.15) 0px, transparent 40%),
                radial-gradient(at 90% 80%, rgba(0, 245, 212, 0.15) 0px, transparent 40%);
        }
        
        .title-neon {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.8), 0 0 20px rgba(255, 0, 127, 0.4);
        }

        .neon-border-pink {
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4), inset 0 0 15px rgba(255, 0, 127, 0.2);
            border: 2px solid #ff007f;
        }

        .neon-border-cyan {
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4), inset 0 0 15px rgba(0, 245, 212, 0.2);
            border: 2px solid #00f5d4;
        }

        .neon-text-cyan {
            text-shadow: 0 0 8px rgba(0, 245, 212, 0.8);
        }

        .neon-text-pink {
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.8);
        }

        /* Animation en cas d'erreur de saisie */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        /* Style de transition glassmorphic */
        .glass-panel {
            background: rgba(12, 8, 24, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Barre d'écriture futuriste */
        .custom-input {
            background: rgba(5, 2, 12, 0.9);
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: #00f5d4;
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.4);
        }

        /* Personnalisation de la barre de défilement */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: #ff007f;
            border-radius: 3px;
        }
    </style>
</head>
<body class="min-height-screen text-slate-100 flex items-center justify-center p-4 md:p-8 min-h-screen">

    <!-- Bouton Audio Flottant -->
    <button id="audio-toggle" onclick="handleMusicToggle()" class="fixed top-6 right-6 w-12 h-12 rounded-full glass-panel flex items-center justify-center text-xl text-[#00f5d4] transition duration-300 hover:scale-110 border border-[#00f5d4]/40 z-50">
        <i class="fa-solid fa-volume-xmark" id="audio-icon"></i>
    </button>

    <!-- Boîte de dialogue de Réussite Finale -->
    <div id="win-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 hidden p-4">
        <div class="glass-panel neon-border-cyan rounded-3xl p-8 max-w-md w-full text-center">
            <div class="text-6xl text-[#00f5d4] mb-4 animate-bounce">
                <i class="fa-solid fa-trophy"></i>
            </div>
            <h2 class="font-bold text-3xl mb-3 text-slate-50 tracking-wider" style="font-family: 'Orbitron', sans-serif;">TOUS LES STAGES RÉSOLUS !</h2>
            <p class="text-slate-300 mb-6">Félicitations ! Vous avez prouvé que votre connaissance des marques est inégalée.</p>
            <button onclick="resetGameProgression()" class="w-full py-3 bg-[#00f5d4] text-slate-950 font-bold rounded-xl hover:scale-105 active:scale-95 transition-all duration-200 uppercase tracking-widest shadow-lg shadow-[#00f5d4]/20">
                Recommencer à zéro
            </button>
        </div>
    </div>

    <!-- Conteneur principal de l'application -->
    <div class="w-full max-w-lg glass-panel rounded-3xl p-6 md:p-8 shadow-2xl relative z-10">
        
        <!-- ÉCRAN : MENU PRINCIPAL -->
        <div id="screen-menu" class="space-y-6 text-center">
            <div class="mb-4">
                <span class="px-3 py-1 bg-[#ff007f]/20 border border-[#ff007f]/40 rounded-full text-[#ff007f] text-xs font-bold uppercase tracking-widest">Premium Edition</span>
            </div>
            <h1 class="text-5xl font-black title-neon text-[#ff007f] tracking-tight py-2 uppercase">Logo Quiz</h1>
            <p class="text-slate-400 text-lg max-w-sm mx-auto">Sauras-tu deviner le logo unique de chaque niveau ? Un défi de taille t'attend !</p>
            
            <div class="pt-4">
                <button onclick="changeScreen('screen-stages')" class="w-full md:w-auto px-10 py-4 bg-gradient-to-r from-[#ff007f] to-[#b30059] text-white font-bold text-lg rounded-xl transition duration-300 hover:shadow-lg hover:shadow-[#ff007f]/30 hover:scale-[1.03] active:scale-95 flex items-center justify-center gap-3 mx-auto">
                    <i class="fa-solid fa-play"></i> JOUER MAINTENANT
                </button>
            </div>
        </div>

        <!-- ÉCRAN : LISTE DES NIVEAUX (STAGES) -->
        <div id="screen-stages" class="hidden space-y-6">
            <div class="flex items-center justify-between border-b border-slate-800 pb-4">
                <button onclick="changeScreen('screen-menu')" class="text-slate-400 hover:text-white transition flex items-center gap-2">
                    <i class="fa-solid fa-chevron-left"></i> Retour
                </button>
                <h2 class="text-xl font-bold uppercase tracking-wider text-[#00f5d4] neon-text-cyan" style="font-family: 'Orbitron', sans-serif;">Sélection Stage</h2>
                <div class="w-10"></div>
            </div>

            <div id="stages-container" class="grid grid-cols-3 gap-4 py-2">
                <!-- Les cartes de niveau seront générées ici dynamiquement -->
            </div>
        </div>

        <!-- ÉCRAN : JEU EN COURS -->
        <div id="screen-game" class="hidden space-y-6">
            
            <!-- Barre d'état du niveau -->
            <div class="flex items-center justify-between border-b border-slate-800 pb-4">
                <button onclick="changeScreen('screen-stages')" class="text-slate-400 hover:text-white transition flex items-center gap-2">
                    <i class="fa-solid fa-chevron-left"></i> Niveaux
                </button>
                <span id="game-title" class="text-lg font-bold text-[#ff007f] neon-text-pink uppercase tracking-widest" style="font-family: 'Orbitron', sans-serif;">Stage 1</span>
                <div class="w-10"></div>
            </div>

            <!-- Tentatives / Coeurs -->
            <div class="flex flex-col items-center justify-center space-y-2">
                <span class="text-xs text-slate-400 uppercase tracking-wider">Tentatives restantes</span>
                <div id="hearts-indicator" class="flex gap-3 text-2xl text-[#ff007f]">
                    <!-- Rempli dynamiquement -->
                </div>
            </div>

            <!-- Cadre d'affichage du Logo -->
            <div id="logo-wrapper" class="w-48 h-48 mx-auto bg-white rounded-2xl p-4 flex items-center justify-center transition-all duration-300 border border-slate-800">
                <img id="logo-img" src="" alt="Quiz Logo" class="max-w-full max-h-full object-contain pointer-events-none select-none">
            </div>

            <!-- Message d'alerte / Feedback / Compte à rebours de blocage -->
            <div id="feedback-panel" class="text-center min-h-[40px] px-4 py-2 rounded-lg flex items-center justify-center text-sm font-semibold tracking-wide">
                <!-- Messages injectés dynamiquement -->
            </div>

            <!-- Formulaire de saisie -->
            <div class="space-y-3">
                <input type="text" id="answer-input" autocomplete="off" placeholder="Entrez le nom de la marque..." class="custom-input w-full px-5 py-4 text-center rounded-xl border border-slate-800 text-lg uppercase tracking-widest text-white font-bold outline-none">
                <button id="submit-btn" onclick="submitAnswer()" class="w-full py-4 bg-[#ff007f] hover:bg-[#ff007f]/90 text-white font-bold rounded-xl transition-all duration-200 uppercase tracking-widest hover:scale-[1.01] active:scale-95 shadow-lg shadow-[#ff007f]/20">
                    Valider la réponse
                </button>
            </div>
        </div>

    </div>

    <script>
        // Liste complète des niveaux du jeu. 1 Quiz par stage avec des logos stables de Wikimedia
        const gameStages = [
            { id: 1, name: "Stage 1", answer: "nike", image: "https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" },
            { id: 2, name: "Stage 2", answer: "apple", image: "https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" },
            { id: 3, name: "Stage 3", answer: "google", image: "https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" },
            { id: 4, name: "Stage 4", answer: "pepsi", image: "https://upload.wikimedia.org/wikipedia/commons/0/0f/Pepsi_logo_2014.svg" },
            { id: 5, name: "Stage 5", answer: "mcdonalds", image: "https://upload.wikimedia.org/wikipedia/commons/3/36/McDonald%27s_Golden_Arches.svg" },
            { id: 6, name: "Stage 6", answer: "starbucks", image: "https://upload.wikimedia.org/wikipedia/commons/d/d5/Starbucks_Corporation_Logo_2011.svg" },
            { id: 7, name: "Stage 7", answer: "bmw", image: "https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg" },
            { id: 8, name: "Stage 8", answer: "amazon", image: "https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" },
            { id: 9, name: "Stage 9", answer: "netflix", image: "https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" }
        ];

        // Variables d'état global du jeu
        let activeStageIndex = 0;
        let livesLeft = 3;
        let cooldownTimer = null;
        let synth = null;
        let synthLoop = null;
        let audioContextInitialized = false;
        let musicActive = false;

        // Change l'écran actuel avec animation visuelle légère
        function changeScreen(screenId) {
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-stages').classList.add('hidden');
            document.getElementById('screen-game').classList.add('hidden');

            document.getElementById(screenId).classList.remove('hidden');

            if (screenId === 'screen-stages') {
                renderStagesMenu();
            }
        }

        // Renvoie le niveau de déblocage maximal enregistré dans le navigateur (Local Storage)
        function getMaxUnlockedStage() {
            return parseInt(localStorage.getItem('logo_quiz_max_stage')) || 1;
        }

        // Enregistre le déblocage d'un nouveau niveau
        function unlockNextStage(stageId) {
            const currentMax = getMaxUnlockedStage();
            if (stageId > currentMax) {
                localStorage.setItem('logo_quiz_max_stage', stageId);
            }
        }

        // Renvoie l'état résolu d'un niveau spécifique
        function isStageCompleted(stageId) {
            return localStorage.getItem(`logo_quiz_stage_${stageId}_completed`) === 'true';
        }

        // Marque un niveau comme terminé
        function setStageCompleted(stageId) {
            localStorage.setItem(`logo_quiz_stage_${stageId}_completed`, 'true');
        }

        // Génère le menu de sélection de niveau
        function renderStagesMenu() {
            const container = document.getElementById('stages-container');
            container.innerHTML = '';

            const maxUnlocked = getMaxUnlockedStage();

            gameStages.forEach((stage, idx) => {
                const btn = document.createElement('button');
                const completed = isStageCompleted(stage.id);
                const unlocked = stage.id <= maxUnlocked;

                btn.className = "flex flex-col items-center justify-center p-4 rounded-xl border transition-all duration-300 ";

                if (completed) {
                    btn.className += "bg-[#00f5d4]/10 border-[#00f5d4]/40 hover:border-[#00f5d4] text-[#00f5d4]";
                    btn.innerHTML = `
                        <span class="font-bold text-lg" style="font-family: 'Orbitron', sans-serif;">${stage.id}</span>
                        <span class="text-[10px] mt-1 font-semibold tracking-wider uppercase"><i class="fa-solid fa-circle-check"></i> Fini</span>
                    `;
                } else if (unlocked) {
                    btn.className += "bg-[#ff007f]/5 border-[#ff007f]/30 hover:border-[#ff007f] text-[#ff007f]";
                    btn.innerHTML = `
                        <span class="font-bold text-lg" style="font-family: 'Orbitron', sans-serif;">${stage.id}</span>
                        <span class="text-[10px] mt-1 font-semibold tracking-wider uppercase"><i class="fa-solid fa-lock-open"></i> Prêt</span>
                    `;
                } else {
                    btn.className += "bg-slate-900/40 border-slate-800 text-slate-600 cursor-not-allowed";
                    btn.innerHTML = `
                        <span class="font-bold text-lg" style="font-family: 'Orbitron', sans-serif;">${stage.id}</span>
                        <span class="text-[10px] mt-1 font-semibold tracking-wider"><i class="fa-solid fa-lock"></i> Verrouillé</span>
                    `;
                }

                if (unlocked) {
                    btn.onclick = () => launchQuiz(idx);
                }

                container.appendChild(btn);
            });
        }

        // Lance le jeu pour un stage particulier
        function launchQuiz(idx) {
            initAudio(); // Initialisation paresseuse de Tone.js lors du clic utilisateur
            activeStageIndex = idx;
            livesLeft = 3;

            changeScreen('screen-game');
            updateGameUI();
            checkAndApplyCooldown();
        }

        // Met à jour les éléments de l'interface graphique de jeu
        function updateGameUI() {
            const currentStage = gameStages[activeStageIndex];
            document.getElementById('game-title').innerText = currentStage.name;
            document.getElementById('logo-img').src = currentStage.image;
            document.getElementById('answer-input').value = '';
            document.getElementById('logo-wrapper').className = "w-48 h-48 mx-auto bg-white rounded-2xl p-4 flex items-center justify-center transition-all duration-300 border border-slate-800";
            
            updateHeartsUI();
        }

        // Met à jour l'affichage des cœurs / tentatives restantes
        function updateHeartsUI() {
            const container = document.getElementById('hearts-indicator');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const heart = document.createElement('i');
                if (i < livesLeft) {
                    heart.className = "fa-solid fa-heart neon-text-pink scale-100 transition duration-300";
                } else {
                    heart.className = "fa-solid fa-heart-broken text-slate-800 scale-90 transition duration-300";
                }
                container.appendChild(heart);
            }
        }

        // Enregistre l'échec et lance le compte à rebours de 5 min dans LocalStorage
        function startBlockageCooldown() {
            const cooldownDuration = 5 * 60 * 1000; // 5 minutes en millisecondes
            const unlockTime = Date.now() + cooldownDuration;
            localStorage.setItem('logo_quiz_cooldown_end', unlockTime);
            
            playToneEffect("lock");
            checkAndApplyCooldown();
        }

        // Vérifie si l'utilisateur est présentement bloqué
        function checkAndApplyCooldown() {
            clearInterval(cooldownTimer);
            const cooldownEnd = localStorage.getItem('logo_quiz_cooldown_end');
            
            if (cooldownEnd) {
                const timeLeft = parseInt(cooldownEnd) - Date.now();
                
                if (timeLeft > 0) {
                    // Désactivation des entrées
                    document.getElementById('answer-input').disabled = true;
                    document.getElementById('submit-btn').disabled = true;
                    document.getElementById('submit-btn').className = "w-full py-4 bg-slate-800 text-slate-500 font-bold rounded-xl cursor-not-allowed uppercase tracking-widest";
                    livesLeft = 0;
                    updateHeartsUI();

                    runCooldownCountdown();
                    return true;
                } else {
                    // Le temps est écoulé, on nettoie
                    localStorage.removeItem('logo_quiz_cooldown_end');
                    resetUserAttempts();
                }
            }
            
            // Activation normale
            document.getElementById('answer-input').disabled = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').className = "w-full py-4 bg-[#ff007f] hover:bg-[#ff007f]/90 text-white font-bold rounded-xl transition-all duration-200 uppercase tracking-widest hover:scale-[1.01] active:scale-95 shadow-lg shadow-[#ff007f]/20";
            return false;
        }

        // Démarre la boucle visuelle du décompte
        function runCooldownCountdown() {
            const panel = document.getElementById('feedback-panel');
            panel.className = "text-center min-h-[40px] px-4 py-2 rounded-lg flex items-center justify-center text-sm font-semibold tracking-wide bg-amber-500/10 border border-amber-500/40 text-amber-500";

            cooldownTimer = setInterval(() => {
                const cooldownEnd = localStorage.getItem('logo_quiz_cooldown_end');
                if (!cooldownEnd) {
                    clearInterval(cooldownTimer);
                    resetUserAttempts();
                    return;
                }

                const remaining = parseInt(cooldownEnd) - Date.now();

                if (remaining <= 0) {
                    clearInterval(cooldownTimer);
                    localStorage.removeItem('logo_quiz_cooldown_end');
                    resetUserAttempts();
                } else {
                    const minutes = Math.floor(remaining / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    const formattedSec = seconds < 10 ? '0' + seconds : seconds;
                    panel.innerHTML = `<span class="animate-pulse"><i class="fa-solid fa-hourglass-half mr-2"></i> Bloqué ! Réessayez dans ${minutes}:${formattedSec}</span>`;
                }
            }, 1000);
        }

        // Restaure les tentatives après blocage
        function resetUserAttempts() {
            livesLeft = 3;
            updateHeartsUI();
            
            // Réactivation des entrées
            document.getElementById('answer-input').disabled = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').className = "w-full py-4 bg-[#ff007f] hover:bg-[#ff007f]/90 text-white font-bold rounded-xl transition-all duration-200 uppercase tracking-widest hover:scale-[1.01] active:scale-95 shadow-lg shadow-[#ff007f]/20";
            
            const panel = document.getElementById('feedback-panel');
            panel.className = "text-center min-h-[40px] px-4 py-2 rounded-lg flex items-center justify-center text-sm font-semibold tracking-wide text-transparent";
            panel.innerText = "";
            document.getElementById('answer-input').focus();
        }

        // Gère la soumission et la vérification de la réponse saisie
        function submitAnswer() {
            const activeCooldown = checkAndApplyCooldown();
            if (activeCooldown) return;

            const inputEl = document.getElementById('answer-input');
            const wrapperEl = document.getElementById('logo-wrapper');
            const panel = document.getElementById('feedback-panel');
            
            const userAnswer = inputEl.value.trim().toLowerCase();
            const currentStage = gameStages[activeStageIndex];
            const correctAnswer = currentStage.answer;

            // Retrait des classes de retour d'effet
            wrapperEl.classList.remove('animate-shake', 'neon-border-pink', 'neon-border-cyan');

            if (userAnswer === correctAnswer) {
                // VICTOIRE DU NIVEAU
                setStageCompleted(currentStage.id);
                unlockNextStage(currentStage.id + 1);

                wrapperEl.classList.add('neon-border-cyan');
                panel.className = "text-center min-h-[40px] px-4 py-2 rounded-lg flex items-center justify-center text-sm font-semibold tracking-wide bg-[#00f5d4]/10 border border-[#00f5d4]/40 text-[#00f5d4] neon-text-cyan";
                panel.innerHTML = `<i class="fa-solid fa-circle-check mr-2"></i> Excellente réponse !`;

                playToneEffect("success");

                setTimeout(() => {
                    panel.innerHTML = "";
                    panel.className = "text-center min-h-[40px] px-4 py-2 rounded-lg flex items-center justify-center text-sm font-semibold tracking-wide text-transparent";
                    
                    if (activeStageIndex + 1 < gameStages.length) {
                        launchQuiz(activeStageIndex + 1);
                    } else {
                        // Fin complète du jeu
                        document.getElementById('win-modal').classList.remove('hidden');
                        playToneEffect("win");
                    }
                }, 1500);

            } else {
                // ERREUR
                livesLeft--;
                updateHeartsUI();
                
                wrapperEl.classList.add('animate-shake', 'neon-border-pink');
                playToneEffect("wrong");

                if (livesLeft <= 0) {
                    startBlockageCooldown();
                } else {
                    panel.className = "text-center min-h-[40px] px-4 py-2 rounded-lg flex items-center justify-center text-sm font-semibold tracking-wide bg-[#ff007f]/10 border border-[#ff007f]/40 text-[#ff007f] neon-text-pink";
                    panel.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> Mauvaise réponse ! Il vous reste ${livesLeft} vie(s).`;
                }

                setTimeout(() => {
                    wrapperEl.classList.remove('animate-shake');
                }, 400);
            }
        }

        // Permet d'appuyer sur Entrée pour valider directement
        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitAnswer();
            }
        });

        // Supprime la progression locale
        function resetGameProgression() {
            localStorage.clear();
            document.getElementById('win-modal').classList.add('hidden');
            changeScreen('screen-menu');
        }

        // Initialisation de l'Audio en temps réel via Tone.js (sans URLs MP3 externes instables)
        function initAudio() {
            if (audioContextInitialized) return;

            // Synthétiseur pour les effets sonores
            synth = new Tone.Synth({
                oscillator: { type: 'sine' },
                envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 0.8 }
            }).toDestination();

            // Synthétiseur mélodique d'ambiance Lo-Fi pour la musique
            const musicSynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: 'triangle' },
                envelope: { attack: 1.2, decay: 1, sustain: 0.7, release: 2 }
            }).toDestination();
            musicSynth.volume.value = -16; // Baisser le volume de fond pour le confort de jeu

            // Séquenceur d'accords cyberpunk pour l'ambiance
            const chords = [
                ["D3", "F3", "A3"],
                ["G3", "A#3", "D4"],
                ["C3", "E3", "G3"],
                ["A3", "C4", "E4"]
            ];
            
            let chordIndex = 0;
            synthLoop = new Tone.Loop(time => {
                musicSynth.triggerAttackRelease(chords[chordIndex], "3n", time);
                chordIndex = (chordIndex + 1) % chords.length;
            }, "2m");

            audioContextInitialized = true;
        }

        // Contrôle le bouton audio On/Off
        function handleMusicToggle() {
            initAudio(); // Garantie d'activation suite à une interaction utilisateur directe

            const icon = document.getElementById('audio-icon');
            const btn = document.getElementById('audio-toggle');

            if (musicActive) {
                Tone.Transport.stop();
                icon.className = "fa-solid fa-volume-xmark";
                btn.style.borderColor = "rgba(0, 245, 212, 0.4)";
                btn.style.color = "#00f5d4";
                musicActive = false;
            } else {
                Tone.start();
                Tone.Transport.start();
                synthLoop.start(0);
                icon.className = "fa-solid fa-volume-high";
                btn.style.borderColor = "#00f5d4";
                btn.style.color = "#030008";
                btn.className = "fixed top-6 right-6 w-12 h-12 rounded-full glass-panel flex items-center justify-center text-xl bg-[#00f5d4] transition duration-300 hover:scale-110 z-50";
                musicActive = true;
            }
        }

        // Joue des effets sonores synthétisés selon la situation de jeu
        function playToneEffect(type) {
            if (!audioContextInitialized) return;

            // Permet de s'assurer que Tone est en cours d'exécution
            Tone.start();

            if (type === "success") {
                synth.triggerAttackRelease("C5", "16n");
                setTimeout(() => synth.triggerAttackRelease("E5", "16n"), 100);
                setTimeout(() => synth.triggerAttackRelease("G5", "8n"), 200);
            } else if (type === "wrong") {
                synth.triggerAttackRelease("F2", "8n");
                setTimeout(() => synth.triggerAttackRelease("C2", "4n"), 120);
            } else if (type === "lock") {
                // Son dramatique de descente
                synth.triggerAttackRelease("G3", "8n");
                setTimeout(() => synth.triggerAttackRelease("E3", "8n"), 150);
                setTimeout(() => synth.triggerAttackRelease("C3", "2n"), 300);
            } else if (type === "win") {
                // Arpège de fanfare triomphante
                const notes = ["C4", "E4", "G4", "C5", "E5", "G5", "C6"];
                notes.forEach((note, index) => {
                    setTimeout(() => {
                        synth.triggerAttackRelease(note, "8n");
                    }, index * 150);
                });
            }
        }

        // Initialisation lors du lancement initial de la page
        window.onload = function() {
            checkAndApplyCooldown();
        }
    </script>
</body>
</html>
